# 飞书机器人配置示例
# 复制此文件为 config.yaml 并填入实际值

# 用户白名单（飞书 open_id）
# 查看方式：在飞书中打开机器人对话，发送任意消息后查看日志中的 sender_id
authorized_users:
  - "ou_xxxxxx"  # 用户A - 替换为实际的 open_id
  - "ou_yyyyyy"  # 用户B - 替换为实际的 open_id

# 单用户/开发模式
# 如果只有一个用户，直接将 open_id 添加到 authorized_users 列表即可

# 可选：权限确认设置
permission:
  # 是否启用权限确认（需要用户确认每个操作）
  enabled: true
  # 权限确认超时时间（秒），0 表示无限等待
  timeout: 0

# Redis 配置（Host-Guest 通信路由）
# 可通过环境变量 REDIS_URL 和 REDIS_PASSWORD 覆盖
redis:
  url: "redis://localhost:6379/0"
  # password: "your_redis_password"  # 可选

# Host Bridge 配置（宿主机网关）
host_bridge:
  port: 8080
  host: "0.0.0.0"

# Guest Proxy 配置（容器内代理）
# 可通过环境变量 HOST_BRIDGE_URL 覆盖
guest_proxy:
  port: 8081
  host_bridge_url: "http://host.docker.internal:8080"

# Terminal 会话配置
# 用于 Terminal CLI 自动创建飞书群聊
terminal_session:
  # 是否启用 Terminal 会话功能
  enabled: true
  # 是否自动创建群聊（Terminal CLI 启动时自动创建）
  auto_create_chat: true
  # 终端退出时是否自动解散群聊
  auto_disband_on_exit: true
  # 默认用户 open_id（用于创建群聊）
  # 也可以通过环境变量 FEISHU_USER_OPEN_ID 设置
  user_open_id: "ou_xxxxxx"  # 替换为实际的 open_id
  # 群聊名称前缀（格式：前缀 主机名）
  group_name_prefix: "💻 Terminal"

  # 同步模式配置
  sync_mode: "notify"  # "notify" (模式A: 只提醒) 或 "sync" (模式B: 完全同步)

  # 权限确认配置
  permission:
    dual_channel: true  # 启用双向权限确认（CLI 和飞书都可以确认）
    cli_timeout: 60     # CLI 确认超时（秒）
    feishu_timeout: 300 # 飞书确认超时（秒）